name: Build Docker Images (Native Multi-Arch)

permissions:
  contents: read
  packages: write

env:
  LATEST_PHP_VERSION: "8.5"
  LATEST_NODE_VERSION: "24"

  CACHE_KEEP_COUNT: "2"
  UNTAGGED_RETENTION_DAYS: "1"
  GHCR_DEBUG: "false"

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docker-build.yml'
      - '8.3/**'
      - '8.4/**'
      - '8.5/**'
      - 'scripts-storage/*.sh'

  schedule:
    - cron: '0 2 * * 0,1,2,5'   # Sunday,Monday,Tuesday,Friday 02:00 UTC

jobs:

  build:
    name: Build ${{ matrix.php }}-node-${{ matrix.node }} (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]
        #php: ["8.4"]
        node: ["20", "22", "24", "25"]
        #node: ["24"]
        arch: ["amd64", "arm64"]
        exclude:
          - php: "8.3"
            node: "25"
          - php: "8.4"
            node: "20"
          - php: "8.5"
            node: "20"

    steps:
      - name: Start Measurement
        if: github.event_name != 'pull_request'
        uses: green-coding-solutions/eco-ci-energy-estimation@9fcdc7c7225cc2cbeead14d114a61a461bd37e66 # v5.2.1
        with:
          task: start-measurement
        continue-on-error: true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout Repo Measurement
        if: github.event_name != 'pull_request'
        uses: green-coding-solutions/eco-ci-energy-estimation@9fcdc7c7225cc2cbeead14d114a61a461bd37e66 # v5.2.1
        with:
          task: get-measurement
          label: 'repo checkout'
        continue-on-error: true

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to GHCR (for cache)
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Prepare scripts
        run: |
          mkdir -p scripts
          cp scripts-storage/composer.sh scripts/
          cp scripts-storage/nodejs-${{ matrix.node }}.sh scripts/

      - name: Build & Push Arch Image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          ARCH_IMAGE="ghcr.io/${REPO_LOWER}:${{ matrix.php }}-node-${{ matrix.node }}-${{ matrix.arch }}"
          CACHE_IMAGE="ghcr.io/${REPO_LOWER}:cache-${{ matrix.php }}-node-${{ matrix.node }}-${{ matrix.arch }}"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Scheduled build → forcing base refresh"
            PULL_FLAG="--pull"
          else
            PULL_FLAG=""
          fi

          docker buildx build \
            $PULL_FLAG \
            --platform linux/${{ matrix.arch }} \
            --cache-from type=registry,ref=$CACHE_IMAGE \
            --cache-to type=registry,ref=$CACHE_IMAGE,mode=max \
            --tag $ARCH_IMAGE \
            --file ./${{ matrix.php }}/node-${{ matrix.node }}/Dockerfile \
            --push \
            .

      - name: Docker build Measurment
        uses: green-coding-solutions/eco-ci-energy-estimation@9fcdc7c7225cc2cbeead14d114a61a461bd37e66 # v5.2.1
        with:
          task: get-measurement
          label: 'docker build'
        continue-on-error: true

      - name: Show Energy Results
        if: github.event_name != 'pull_request'
        uses: green-coding-solutions/eco-ci-energy-estimation@9fcdc7c7225cc2cbeead14d114a61a461bd37e66 # v5.2.1
        with:
          task: display-results
        continue-on-error: true


  merge:
    name: Merge multi-arch manifests
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]
        #php: ["8.4"]
        node: ["20", "22", "24", "25"]
        #node: ["24"]
        exclude:
          - php: "8.3"
            node: "25"
          - php: "8.4"
            node: "20"
          - php: "8.5"
            node: "20"

    steps:
      - name: Start Measurement
        if: github.event_name != 'pull_request'
        uses: green-coding-solutions/eco-ci-energy-estimation@9fcdc7c7225cc2cbeead14d114a61a461bd37e66 # v5.2.1
        with:
          task: start-measurement
        continue-on-error: true

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to GHCR (for cache)
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create Multi-Arch Manifest in GHCR
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          GHCR_TAG="ghcr.io/${REPO_LOWER}:${{ matrix.php }}-node-${{ matrix.node }}"

          docker buildx imagetools create \
            --tag $GHCR_TAG \
            ghcr.io/${REPO_LOWER}:${{ matrix.php }}-node-${{ matrix.node }}-amd64 \
            ghcr.io/${REPO_LOWER}:${{ matrix.php }}-node-${{ matrix.node }}-arm64

      - name: Push Final Image to Docker Hub
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          docker buildx imagetools create \
            --tag cwallenberg/php-image:${{ matrix.php }}-node-${{ matrix.node }} \
            ghcr.io/${REPO_LOWER}:${{ matrix.php }}-node-${{ matrix.node }}

      - name: Tag Latest (if configured combo)
        if: matrix.php == env.LATEST_PHP_VERSION && matrix.node == env.LATEST_NODE_VERSION
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          docker buildx imagetools create \
            --tag cwallenberg/php-image:latest \
            ghcr.io/${REPO_LOWER}:${{ matrix.php }}-node-${{ matrix.node }}

      - name: Docker image merge Measurment
        uses: green-coding-solutions/eco-ci-energy-estimation@9fcdc7c7225cc2cbeead14d114a61a461bd37e66 # v5.2.1
        with:
          task: get-measurement
          label: 'docker merge'
        continue-on-error: true

      - name: Delete GHCR Arch Tags (paginate)
        run: |
          set -e

          DEBUG="${GHCR_DEBUG}"

          debug() {
            if [ "$DEBUG" = "true" ]; then
              echo "[DEBUG] $1"
            fi
          }

          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          PACKAGE_NAME=$(echo "${REPO_LOWER}" | cut -d'/' -f2)

          API_PATH="user/packages/container/${PACKAGE_NAME}/versions"

          debug "API Path: $API_PATH"
          debug "Calling with --paginate"

          ALL_VERSIONS=$(gh api "$API_PATH" --paginate)

          debug "Total versions fetched: $(echo "$ALL_VERSIONS" | jq length)"

          for ARCH in amd64 arm64; do
            TARGET_TAG="${{ matrix.php }}-node-${{ matrix.node }}-${ARCH}"
            echo "Searching for tag: $TARGET_TAG"

            echo "$ALL_VERSIONS" | jq -c '.[]' | while read VERSION; do
              VERSION_ID=$(echo "$VERSION" | jq -r '.id')
              TAGS=$(echo "$VERSION" | jq -r '.metadata.container.tags[]?' || true)

              debug "Version ID: $VERSION_ID"
              debug "Tags: $TAGS"

              if echo "$TAGS" | grep -qx "$TARGET_TAG"; then
                echo "Deleting version id: $VERSION_ID (tag $TARGET_TAG)"

                DELETE_PATH="user/packages/container/${PACKAGE_NAME}/versions/${VERSION_ID}"
                debug "DELETE: https://api.github.com/${DELETE_PATH}"

                gh api -X DELETE "$DELETE_PATH"

                sleep 2
              fi
            done
          done
        env:
          GH_TOKEN: ${{ secrets.GHCR_PAT }}

      - name: GHCR Arch Tags Cleanup Measurment
        uses: green-coding-solutions/eco-ci-energy-estimation@9fcdc7c7225cc2cbeead14d114a61a461bd37e66 # v5.2.1
        with:
          task: get-measurement
          label: 'ghcr arch cleanup'
        continue-on-error: true

      - name: Show Energy Results
        if: github.event_name != 'pull_request'
        uses: green-coding-solutions/eco-ci-energy-estimation@9fcdc7c7225cc2cbeead14d114a61a461bd37e66 # v5.2.1
        with:
          task: display-results
        continue-on-error: true


  prune-cache:
    name: Prune GHCR Cache & Untagged Images
    runs-on: ubuntu-latest
    needs: merge

    steps:
      - name: Start Measurement
        if: github.event_name != 'pull_request'
        uses: green-coding-solutions/eco-ci-energy-estimation@9fcdc7c7225cc2cbeead14d114a61a461bd37e66 # v5.2.1
        with:
          task: start-measurement
        continue-on-error: true

      - name: Prune GHCR Untagged Images
        run: |
          set -euo pipefail

          DEBUG="${GHCR_DEBUG}"
          RETENTION_DAYS="${UNTAGGED_RETENTION_DAYS}"

          debug() {
            if [ "$DEBUG" = "true" ]; then
              echo "[DEBUG] $1"
            fi
          }

          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          PACKAGE_NAME=$(echo "${REPO_LOWER}" | cut -d'/' -f2)

          API_PATH="user/packages/container/${PACKAGE_NAME}/versions"

          debug "Fetching all versions with --paginate"
          ALL_VERSIONS=$(gh api "$API_PATH" --paginate)

          NOW=$(date -u +%s)
          debug "Current timestamp (UTC): $NOW"
          debug "Retention days: $RETENTION_DAYS"

          echo "$ALL_VERSIONS" | jq -c '.[]' | while read VERSION; do
            VERSION_ID=$(echo "$VERSION" | jq -r '.id')
            CREATED_AT=$(echo "$VERSION" | jq -r '.created_at')
            TAGS=$(echo "$VERSION" | jq -r '.metadata.container.tags // empty | length')

            # Skip tagged images
            if [ "$TAGS" -ne 0 ]; then
              debug "Skipping tagged version id: $VERSION_ID"
              continue
            fi

            CREATED_TS=$(date -u -d "$CREATED_AT" +%s)
            AGE_DAYS=$(( (NOW - CREATED_TS) / 86400 ))

            debug "Version $VERSION_ID age: $AGE_DAYS days"

            if [ "$AGE_DAYS" -gt "$RETENTION_DAYS" ]; then
              echo "Deleting untagged version id: $VERSION_ID (age ${AGE_DAYS} days)"

              DELETE_PATH="user/packages/container/${PACKAGE_NAME}/versions/${VERSION_ID}"
              debug "DELETE: https://api.github.com/${DELETE_PATH}"

              gh api -X DELETE "$DELETE_PATH"

              sleep 1
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GHCR_PAT }}

      - name: GHCR Cache tags Cleanup Measurment
        uses: green-coding-solutions/eco-ci-energy-estimation@9fcdc7c7225cc2cbeead14d114a61a461bd37e66 # v5.2.1
        with:
          task: get-measurement
          label: 'ghcr cache tags cleanup'
        continue-on-error: true

      - name: Show Energy Results
        if: github.event_name != 'pull_request'
        uses: green-coding-solutions/eco-ci-energy-estimation@9fcdc7c7225cc2cbeead14d114a61a461bd37e66 # v5.2.1
        with:
          task: display-results
        continue-on-error: true
