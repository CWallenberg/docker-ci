name: Build Docker Images

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docker-build.yml'
      - '8.3/**'
      - '8.4/**'
      - '8.5/**'
      - 'scripts-storage/*.sh'

  schedule:
    - cron: '0 2 * * 1'   # Monday 02:00 UTC

jobs:
  build:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.3"
            node: "20"
          - php: "8.3"
            node: "22"
          - php: "8.3"
            node: "24"
          - php: "8.4"
            node: "22"
          - php: "8.4"
            node: "24"
          - php: "8.5"
            node: "22"
          - php: "8.5"
            node: "24"

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}

      LATEST_PHP_VERSION: "8.5"
      LATEST_NODE_VERSION: "24"

    steps:
      - uses: actions/checkout@v4

      # Login to Docker Hub
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        run: echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      # Login to GHCR (cache storage)
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Enable multi-arch
      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@v3

      # Setup Buildx
      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Prepare scripts
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p scripts
          cp scripts-storage/composer.sh scripts/
          cp scripts-storage/nodejs-${{ matrix.node }}.sh scripts/

      - name: Build & Push Multi-Arch Image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          DOCKERHUB_IMAGE="cwallenberg/php-image:${{ matrix.php }}-node-${{ matrix.node }}"
          CACHE_IMAGE="ghcr.io/${REPO_LOWER}:cache-${{ matrix.php }}-node-${{ matrix.node }}"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Scheduled build → forcing base refresh"
            PULL_FLAG="--pull"
          else
            PULL_FLAG=""
          fi

          docker buildx build \
            $PULL_FLAG \
            --platform linux/amd64,linux/arm64 \
            --cache-from type=registry,ref=$CACHE_IMAGE \
            --cache-to type=registry,ref=$CACHE_IMAGE,mode=max \
            --tag $DOCKERHUB_IMAGE \
            --file ./${{ matrix.php }}/node-${{ matrix.node }}/Dockerfile \
            --push \
            .

      - name: Tag Latest (if configured combo)
        if: github.event_name != 'pull_request' && matrix.php == env.LATEST_PHP_VERSION && matrix.node == env.LATEST_NODE_VERSION
        run: |
          docker buildx imagetools create \
            --tag cwallenberg/php-image:latest \
            cwallenberg/php-image:${{ matrix.php }}-node-${{ matrix.node }}
