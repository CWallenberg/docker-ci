name: Build Docker Images (Native Multi-Arch)

permissions:
  contents: read
  packages: write

env:
  LATEST_PHP_VERSION: "8.5"
  LATEST_NODE_VERSION: "24"

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/docker-build.yml'
      - '8.3/**'
      - '8.4/**'
      - '8.5/**'
      - 'scripts-storage/*.sh'

  schedule:
    - cron: '0 2 * * 1'   # Monday 02:00 UTC

jobs:

  build:
    name: Build ${{ matrix.php }}-node-${{ matrix.node }} (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm64' || 'ubuntu-24.04' }}

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]
        node: ["20", "22", "24"]
        arch: ["amd64", "arm64"]
        exclude:
          - php: "8.4"
            node: "20"
          - php: "8.5"
            node: "20"

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}

    steps:
      - name: Start Measurement
        if: github.event_name != 'pull_request'
        uses: green-coding-solutions/eco-ci-energy-estimation@0fd2200a8f02d7939066c535e3642c2ebee9db16 # use hash or @vX here (See note below)
        with:
          task: start-measurement
        continue-on-error: true

      - uses: actions/checkout@v4

      - name: Checkout Repo Measurement
        if: github.event_name != 'pull_request'
        uses: green-coding-solutions/eco-ci-energy-estimation@0fd2200a8f02d7939066c535e3642c2ebee9db16 # use hash or @vX here (See note below)
        with:
          task: get-measurement
          label: 'repo checkout'
        continue-on-error: true

      - name: Login to Docker Hub
        run: echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Login to GHCR (for cache)
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare scripts
        run: |
          mkdir -p scripts
          cp scripts-storage/composer.sh scripts/
          cp scripts-storage/nodejs-${{ matrix.node }}.sh scripts/

      - name: Build & Push Arch Image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          DOCKERHUB_IMAGE="cwallenberg/php-image:${{ matrix.php }}-node-${{ matrix.node }}-${{ matrix.arch }}"
          CACHE_IMAGE="ghcr.io/${REPO_LOWER}:cache-${{ matrix.php }}-node-${{ matrix.node }}-${{ matrix.arch }}"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Scheduled build → forcing base refresh"
            PULL_FLAG="--pull"
          else
            PULL_FLAG=""
          fi

          docker buildx build \
            $PULL_FLAG \
            --platform linux/${{ matrix.arch }} \
            --cache-from type=registry,ref=$CACHE_IMAGE \
            --cache-to type=registry,ref=$CACHE_IMAGE,mode=max \
            --tag $DOCKERHUB_IMAGE \
            --file ./${{ matrix.php }}/node-${{ matrix.node }}/Dockerfile \
            --push \
            .

      - name: Docker build Measurment
        uses: green-coding-solutions/eco-ci-energy-estimation@0fd2200a8f02d7939066c535e3642c2ebee9db16 # use hash or @vX here (See note below)
        with:
          task: get-measurement
          label: 'docker build'
        continue-on-error: true

      - name: Show Energy Results
        if: github.event_name != 'pull_request'
        uses: green-coding-solutions/eco-ci-energy-estimation@0fd2200a8f02d7939066c535e3642c2ebee9db16 # use hash or @vX here (See note below)
        with:
          task: display-results
        continue-on-error: true


  merge:
    name: Merge multi-arch manifests
    needs: build
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]
        node: ["20", "22", "24"]
        exclude:
          - php: "8.4"
            node: "20"
          - php: "8.5"
            node: "20"

    steps:
      - name: Start Measurement
        if: github.event_name != 'pull_request'
        uses: green-coding-solutions/eco-ci-energy-estimation@0fd2200a8f02d7939066c535e3642c2ebee9db16 # use hash or @vX here (See note below)
        with:
          task: start-measurement
        continue-on-error: true

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Create Multi-Arch Manifest
        run: |
          docker buildx imagetools create \
            --tag cwallenberg/php-image:${{ matrix.php }}-node-${{ matrix.node }} \
            cwallenberg/php-image:${{ matrix.php }}-node-${{ matrix.node }}-amd64 \
            cwallenberg/php-image:${{ matrix.php }}-node-${{ matrix.node }}-arm64

      - name: Tag Latest (if configured combo)
        if: matrix.php == env.LATEST_PHP_VERSION && matrix.node == env.LATEST_NODE_VERSION
        run: |
          docker buildx imagetools create \
            --tag cwallenberg/php-image:latest \
            cwallenberg/php-image:${{ matrix.php }}-node-${{ matrix.node }}

      - name: Docker image merge Measurment
        uses: green-coding-solutions/eco-ci-energy-estimation@0fd2200a8f02d7939066c535e3642c2ebee9db16 # use hash or @vX here (See note below)
        with:
          task: get-measurement
          label: 'docker build'
        continue-on-error: true

      - name: Show Energy Results
        if: github.event_name != 'pull_request'
        uses: green-coding-solutions/eco-ci-energy-estimation@0fd2200a8f02d7939066c535e3642c2ebee9db16 # use hash or @vX here (See note below)
        with:
          task: display-results
        continue-on-error: true
